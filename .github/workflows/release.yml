name: Build and Attach Python Package to Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Build distribution packages
      run: uv build

    - name: Upload packages to Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*.whl
